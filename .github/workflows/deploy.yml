name: Deploy Portfolio

on:
  push:
    branches:
      - main

concurrency:
  group: portfolio-production
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portfolio repository
        uses: actions/checkout@v5
      
      - name: Checkout idle repository
        uses: actions/checkout@v5
        with:
          repository: SinanErbezci/cs50x_final
          path: idle-game
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
      
      - name: Copy idle game
        run: |
          mkdir -p dist/projects/idle-game
          cp idle-game/index.html dist/projects/idle-game/
          cp -R idle-game/static dist/projects/idle-game/
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-3

      - name: Upload to S3
        run: |
          aws s3 sync dist s3://sinanerbezci-portfolio \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
        
          aws s3 cp dist/index.html s3://sinanerbezci-portfolio/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ECL2NX6B0V11L \
            --paths "/*"